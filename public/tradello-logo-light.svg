<svg width="180" height="44" viewBox="0 0 180 44" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="line-grad-l" x1="7" y1="34" x2="37" y2="11" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00c464"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <clipPath id="box-clip-l">
      <rect x="0" y="0" width="44" height="44" rx="10"/>
    </clipPath>
  </defs>

  <!-- Light background -->
  <rect x="0" y="0" width="44" height="44" rx="10" fill="#f0f0ff"/>

  <!-- Chart line — behind the T -->
  <g clip-path="url(#box-clip-l)">
    <polyline
      points="7,34 15,27 23,30 37,11"
      fill="none"
      stroke="url(#line-grad-l)"
      stroke-width="2.5"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <circle cx="37" cy="11" r="2.8" fill="#2563eb"/>
  </g>

  <!-- T mark — rendered on top -->
  <rect x="9" y="13" width="26" height="4.5" rx="2.25" fill="#0a0a1a"/>
  <rect x="19.5" y="13" width="5" height="20" rx="2.5" fill="#0a0a1a"/>

  <!-- Wordmark -->
  <text x="54" y="30"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-weight="800" font-size="20" letter-spacing="-0.8"
    fill="#0a0a1a">tradello</text>
</svg>
